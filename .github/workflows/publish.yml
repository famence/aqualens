name: Publish

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Version & Publish
    runs-on: ubuntu-latest
    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create or update version PR
        id: version_pr
        uses: changesets/action@v1
        with:
          version: npm run publish:version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Typecheck packages before publish
        if: steps.version_pr.outputs.hasChangesets == 'false'
        run: npm run typecheck

      - name: Build packages before publish
        if: steps.version_pr.outputs.hasChangesets == 'false'
        run: npm run build

      - name: Publish packages and create GitHub Releases
        id: publish_packages
        if: steps.version_pr.outputs.hasChangesets == 'false'
        uses: changesets/action@v1
        with:
          publish: npm run publish:publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  demo-build:
    name: Build Demo
    runs-on: ubuntu-latest
    concurrency:
      group: demo-pages-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Install demo dependencies
        run: npm ci
        working-directory: demo

      - name: Build demo
        run: npm run build
        working-directory: demo
        env:
          # Ensures static export + basePath match https://<user>.github.io/<repo>/
          AQUALENS_GITHUB_PAGES_BASE_PATH: /${{ github.event.repository.name }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/out

  demo-deploy:
    name: Deploy to GitHub Pages
    needs: demo-build
    runs-on: ubuntu-latest
    concurrency:
      group: demo-pages-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
